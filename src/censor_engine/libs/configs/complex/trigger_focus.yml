censor_settings:
  enabled_parts:
    - "FACE_FEMALE"
    - "ARMPITS_EXPOSED"
    - "ARMPITS_COVERED"
    - "FEMALE_BREAST_EXPOSED"
    - "FEMALE_BREAST_COVERED"
    - "BELLY_EXPOSED"
    - "BELLY_COVERED"
    - "BUTTOCKS_EXPOSED"
    - "BUTTOCKS_COVERED"
    - "ANUS_EXPOSED"
    - "ANUS_COVERED"
    - "FEMALE_GENITALIA_EXPOSED"
    - "FEMALE_GENITALIA_COVERED"
    - "FEET_EXPOSED"
    - "FEET_COVERED"
    - "FACE_MALE"
    - "MALE_GENITALIA_EXPOSED"
    - "MALE_BREAST_EXPOSED"

  merge_settings:
    merge_groups:
      - ["FEMALE_BREAST_EXPOSED", "FEMALE_BREAST_COVERED"]

  default_part_settings:
    mask: "Bar"

  FEMALE_BREAST_EXPOSED:
    margin: 0.3
    censors:
      - effect: "Outline"
        parameters:
          colour: "PINK"
      - effect: "Blur"
        parameters:
          factor: 20
      - effect: "Greyscale"

  FEMALE_GENITALIA_EXPOSED:
    margin: 0.3
    censors:
      - effect: "Outline"
        parameters:
          colour: "PINK"
      - effect: "Blur"
        parameters:
          factor: 20
      - effect: "Greyscale"
