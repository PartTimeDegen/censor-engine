censor_settings:
  enabled_parts:
    - "FEMALE_BREAST_EXPOSED"
    - "FEMALE_BREAST_COVERED"
    - "BUTTOCKS_EXPOSED"
    - "BUTTOCKS_COVERED"
    - "ANUS_EXPOSED"
    - "ANUS_COVERED"
    - "FEMALE_GENITALIA_EXPOSED"
    - "FEMALE_GENITALIA_COVERED"

  merge_settings:
    merge_groups:
      - ["FEMALE_BREAST_EXPOSED", "FEMALE_BREAST_COVERED"]

  default_part_settings:
    censors:
      [
        { "effect": "Outline", parameters: { "colour": "BLACK" } },
        { "effect": "Blur", parameters: { "factor": 5 } },
      ]
    mask: "JointBox"

  FEMALE_BREAST_EXPOSED:
    margin: 0.3
    state: "protected"
    censors:
      - effect: "Outline"
        parameters:
          colour: "PINK"
      - effect: "Blur"
        parameters:
          factor: 20
      - effect: "Greyscale"

  FEMALE_GENITALIA_EXPOSED:
    state: "protected"
    margin: 0.3
    censors:
      - effect: "Outline"
        parameters:
          colour: "PINK"
      - effect: "Blur"
        parameters:
          factor: 20
      - effect: "Greyscale"
