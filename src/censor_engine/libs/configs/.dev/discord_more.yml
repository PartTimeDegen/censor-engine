video_settings:
  frame_difference_threshold: 0.02
  part_frame_hold_seconds: 0.5
  persistence_groups:
    - ["FEMALE_BREAST_EXPOSED", "FEMALE_BREAST_COVERED"]

censor_settings:
  enabled_parts:
    - "FEMALE_BREAST_EXPOSED"
    - "FEMALE_BREAST_COVERED"
    - "BUTTOCKS_EXPOSED"
    - "BUTTOCKS_COVERED"
    - "ANUS_EXPOSED"
    - "ANUS_COVERED"
    - "FEMALE_GENITALIA_EXPOSED"
    - "FEMALE_GENITALIA_COVERED"
    - "MALE_GENITALIA_EXPOSED"

  merge_settings:
    merge_groups:
      - ["FEMALE_BREAST_EXPOSED", "FEMALE_BREAST_COVERED"]
      - ["FEMALE_GENITALIA_EXPOSED", "FEMALE_GENITALIA_COVERED"]
      - ["ANUS_EXPOSED", "ANUS_COVERED"]

  default_part_settings:
    censors:
      [
        {
          "style": "CentricChromaticAberration",
          parameters: { "offset": 2, "blur": 5 },
        },
        { "style": "Pixelate", parameters: { "factor": 10 } },
      ]
    shape: "Ellipse"
    margin: 0.2

  FEMALE_GENITALIA_EXPOSED:
    state: "protected"
    margin: -0.25
    shape: RoundedBox
    censors:
      - style: DevText
        parameters: { "font_percent": 0.8, "font": "comic" }
      - style: "Outline"
        parameters:
          thickness: 6
          softness: 2
          colour: PINK
      - style: "Overlay"
        parameters:
          colour: "WHITE"

  ANUS_EXPOSED:
    state: "revealed"
    shape: Ellipse
    censors:
      - style: "Outline"
        parameters:
          thickness: 6
          softness: 2
          colour: PINK

  ANUS_COVERED:
    state: "revealed"
    shape: Ellipse
    censors:
      - style: "Outline"
        parameters:
          thickness: 6
          softness: 2
          colour: PINK
